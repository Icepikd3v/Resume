<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">Printer Stream Offline</title>
  <desc id="desc">Placeholder camera feed shown while OctoPrint stream is offline</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)" />
  <rect x="20" y="20" width="600" height="320" rx="16" fill="none" stroke="#4b5563" stroke-width="2" />
  <g fill="#5eead4">
    <circle cx="320" cy="150" r="36" />
    <rect x="302" y="130" width="36" height="40" rx="6" fill="#0f172a" />
  </g>
  <text x="320" y="230" text-anchor="middle" fill="#e5e7eb" font-size="28" font-family="Arial, sans-serif">
    Stream Offline
  </text>
  <text x="320" y="262" text-anchor="middle" fill="#9ca3af" font-size="18" font-family="Arial, sans-serif">
    OctoPrint / Printer instance currently unavailable
  </text>
</svg>
